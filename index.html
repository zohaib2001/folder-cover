<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FolderCover — Notion Cover Generator</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,900;1,9..40,400&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@400;500;600;700;900&family=Syne:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700;9..144,900&family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 18 18" fill="none" stroke="currentColor">
          <path d="M2 9.5C2 8.4 2.9 7.5 4 7.5h2.5L8 6h4v1.5H14c1.1 0 2 .9 2 2V14c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V9.5z" stroke-width="1.3" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="logo-name">Folder<em>Cover</em></span>
    </div>
    <div class="header-right">
      <span class="badge">Notion Cover Generator</span>
      <div class="theme-toggle-wrap">
        <svg class="theme-icon moon-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle light/dark mode" aria-pressed="false">
          <div class="theme-toggle-knob"></div>
        </button>
        <svg class="theme-icon sun-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </div>
    </div>
  </header>

  <main>
    <section class="preview-col">
      <span class="col-label">Preview</span>
      <div class="preview-shell">
        <canvas id="fc" width="1500" height="600"></canvas>
        <div class="preview-footer">
          <span class="meta-pill">1500 × 600 px</span>
          <span class="meta-pill" id="bgPill">PNG · Solid BG</span>
        </div>
      </div>
      <button class="dl-btn" id="dlBtn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M7 1.5v7m0 0L4.5 6m2.5 2.5L9.5 6M1.5 11.5h11"/>
        </svg>
        Download PNG
      </button>
    </section>

    <section class="controls-col">
      <div class="section-label">Cover text</div>
      <div class="panel">
        <div class="panel-row">
          <span class="row-label">Label</span>
          <input class="name-input" id="nameInp" type="text" value="" placeholder="e.g. Project Notes, Reading List…" spellcheck="false" />
          <span class="char-count" id="charCount">0 chars</span>
        </div>
      </div>

      <div class="section-label">Background colour</div>
      <div class="panel">
        <div class="panel-row">
          <span class="row-label">Colour</span>
          <div class="swatch-btn" id="bgSwatchBtn">
            <div class="swatch-fill" id="bgFill" style="background:#0d0d10"></div>
            <input type="color" id="bgPicker" value="#0d0d10" />
          </div>
          <div class="hex-field">
            <span class="hash">#</span>
            <input type="text" id="bgHex" value="0D0D10" maxlength="6" />
          </div>
        </div>
        <div class="presets-row" id="bgPresets"></div>
      </div>

      <div class="section-label">Folder colour</div>
      <div class="panel">
        <div class="panel-row">
          <span class="row-label">Colour</span>
          <div class="swatch-btn" id="fSwatchBtn">
            <div class="swatch-fill" id="fFill" style="background:#F5A623"></div>
            <input type="color" id="fPicker" value="#F5A623" />
          </div>
          <div class="hex-field">
            <span class="hash">#</span>
            <input type="text" id="fHex" value="F5A623" maxlength="6" />
          </div>
        </div>
        <div class="presets-row" id="folderPresets"></div>
      </div>

      <div class="section-label">Text colour</div>
      <div class="panel">
        <div class="panel-row">
          <span class="row-label">Colour</span>
          <div class="swatch-btn" id="tSwatchBtn">
            <div class="swatch-fill" id="tFill" style="background:#FFFFFF"></div>
            <input type="color" id="tPicker" value="#FFFFFF" />
          </div>
          <div class="hex-field">
            <span class="hash">#</span>
            <input type="text" id="tHex" value="FFFFFF" maxlength="6" />
          </div>
        </div>
        <div class="presets-row" id="textPresets"></div>
      </div>

      <div class="section-label">Font</div>
      <div class="panel">
        <div class="font-grid" id="fontGrid"></div>
      </div>

      <div class="section-label">Font weight</div>
      <div class="panel">
        <div class="weight-grid" id="weightGrid"></div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
